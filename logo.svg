<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <!-- Sunburst -->
  <g fill="#FFAE00" stroke="#FFAE00" stroke-width="8" stroke-linecap="round">
    <!-- Center half circle -->
    <path d="M 140 140 A 60 60 0 0 1 260 140 Z" fill="#FFAE00" stroke="none" />
    
    <!-- Horizon lines -->
    <!-- Left -->
    <line x1="50" y1="140" x2="80" y2="140" />
    <line x1="100" y1="140" x2="130" y2="140" />
    <!-- Right -->
    <line x1="270" y1="140" x2="300" y2="140" />
    <line x1="320" y1="140" x2="350" y2="140" />
    
    <!-- Rays -->
    <line x1="200" y1="65" x2="200" y2="35" /> <!-- center -->
    <line x1="155" y1="75" x2="135" y2="50" /> <!-- left high -->
    <line x1="245" y1="75" x2="265" y2="50" /> <!-- right high -->
    
    <line x1="115" y1="100" x2="85" y2="80" /> <!-- left mid -->
    <line x1="285" y1="100" x2="315" y2="80" /> <!-- right mid -->
    
    <line x1="95" y1="125" x2="65" y2="115" /> <!-- left low -->
    <line x1="305" y1="125" x2="335" y2="115" /> <!-- right low -->
  </g>
</svg>
